eadline +1.1% MoM nóng. Đây là \"sticky, không phải cooling\" — soft-data dovish nhưng hard-data chưa xác nhận.\n\n---\n\n## 2. Lao động — 🟢 MẠNH\n\n| Ngày | Chỉ số | Actual | Forecast | vs Previous | Surprise |\n|---|---|---|---|---|---|\n| 02/06 | JOLTS Job Openings | 7.62M | 6.86M | ↑ | 🟢 Tốt |\n| 03/06 | ADP Nonfarm Employment | +122k | +118k | ↑ | 🟢 Tốt |\n| 04/06 | Initial Jobless Claims | 225k | 214k | ↑ | 🔴 Nóng |\n| 05/06 | Nonfarm Payrolls | +172k | +85k | ↓ | 🟢 Tốt |\n| 05/06 | Private Nonfarm Payrolls | +120k | +85k | ↓ | 🟢 Tốt |\n| 05/06 | Unemployment Rate | 4.3% | 4.3% | → | 🟡 Inline |\n| 05/06 | Average Hourly Earnings (YoY) | +3.4% | +3.4% | ↓ -0.20pp | 🟡 Inline |\n| 11/06 | Initial Jobless Claims | 229k | 220k | ↑ | 🔴 Nóng |\n| 18/06 | Initial Jobless Claims | 226k | 225k | ↓ | 🟡 Inline |\n| 25/06 | Initial Jobless Claims | 215k | 225k | ↓ | 🟢 Cool |\n| 30/06 | JOLTS Job Openings | 7.59M | 7.28M | ↑ | 🟢 Tốt |\n\n**Kết luận:** NFP +172k gấp đôi dự báo + JOLTS 7.6M beat mạnh hai đầu tháng xóa lo hạ cánh cứng; claims dao động 215-229k (cooling nhẹ nhưng chưa breakout). Sahm Rule +0.10 — CHƯA kích hoạt (ngưỡng 0.50), thất nghiệp 3mo-avg 4.3% vs đáy 4.2%; lao động vẫn chặt, AHE +3.4% giảm nhẹ giảm áp lực lương.\n\n---\n\n## 3. Tăng trưởng — 🟢 TĂNG\n\n| Ngày | Chỉ số | Actual | Forecast | vs Previous | Surprise |\n|---|---|---|---|---|---|\n| 01/06 | ISM Manufacturing PMI | 54.0 | 53.3 | ↑ | 🟢 Tốt |\n| 01/06 | ISM Manufacturing Prices | 82.1 | 85.3 | ↓ | 🟢 Cool |\n| 03/06 | ISM Non-Mfg (Services) PMI | 54.5 | 53.7 | ↑ | 🟢 Tốt |\n| 03/06 | ISM Services New Orders | 57.3 | 53.4 | ↑ | 🟢 Tốt |\n| 03/06 | ISM Services Prices | 71.3 | 72.3 | ↑ | 🟡 Sticky |\n| 03/06 | Factory Orders (MoM) | +4.8% | +4.6% | ↑ | 🟢 Tốt |\n| 17/06 | Retail Sales (MoM) | +0.9% | +0.5% | ↑ | 🟢 Tốt |\n| 17/06 | Retail Control (MoM) | +0.7% | +0.4% | ↑ | 🟢 Tốt |\n| 18/06 | Philadelphia Fed Mfg | 10.3 | 9.8 | ↑ | 🟢 Tốt |\n| 23/06 | S&P Global Mfg PMI | 55.7 | 54.6 | ↑ | 🟢 Tốt |\n| 23/06 õ — Housing Starts sụp -15.4% MoM, New Home Sales -7.3%, Permits âm — phản ứng trực tiếp với lãi suất cao kéo dài (mortgage ~6.8%, 10Y quanh 4.4%). Pending Home Sales +3.8% là điểm sáng lẻ; nhà ở là nhóm chịu \"higher-for-longer\" nặng nhất.\n\n---\n\n## 6. Fed & Lãi suất — 🔴 HAWKISH\n\n| Ngày | Chỉ số | Actual | Forecast | vs Previous | Surprise |\n|---|---|---|---|---|---|\n| 17/06 | Fed Interest Rate Decision | 3.75% | 3.75% | → | 🟡 Inline (hawkish hold) |\n\n| Chỉ số | Đầu tháng | Cuối tháng | Thay đổi |\n|---|---|---|---|\n| Fed Funds Rate (DFF) | 3.62% | 3.63% | → |\n| 10Y Treasury (DGS10) | 4.45% | 4.38% | ↓ -7bp |\n| 2Y Treasury (DGS2) | 3.98% | 4.10% | ↑ +12bp |\n| 2s10s Spread (T10Y2Y) | +0.42pp | +0.30pp | ↓ flatten -12bp |\n| VIX (VIXCLS) | 15.3 | 16.5 | ↑ +1.2 |\n| HY OAS (BAMLH0A0HYM2) | 2.74% | 2.75% | → |\n| 10Y Breakeven (T10YIE) | 2.40% | 2.24% | ↓ -16bp |\n\n**Kết luận:** Fed giữ 3.75% nhưng dot plot dịch LÊN (median năm nay 3.4%→3.8%, năm 1 3.1%→3.6%) — hawkish hold, bớt kỳ vọng cắt. Đường cong flatten (2Y +12bp vượt 10Y -7bp) khi thị trường price OUT cuts sau NFP/Retail beat; breakeven rơi -16bp cho thấy kỳ vọng lạm phát dài hạn hạ dù hard-data còn nóng.\n\n---\n\n## Sector — Phân bổ danh mục\n\n| Sector | ETF | Ngắn hạn | Dài hạn | RS 1M | RS 3M | vs MA50 | Lý do 1 câu |\n|---|---|---|---|---|---|---|---|\n| Healthcare | XLV | **OW** | Neutral | +14.3 | -2.3 | ↑ | Defensive bid + STRONG_INFLOW (MFI 83), dẫn RS 1M cả thị trường |\n| Financials | XLF | **OW** | Neutral | +10.3 | -0.9 | ↑ | Curve dương + no-landing, breadth broad 92%, MFI 70 inflow mạnh |\n| Industrials | XLI | Neutral | Neutral | +7.6 | -1.6 | ↑ | Cyclical engine on (ISM>54) nhưng rs_slope -3.3 momentum chậm lại |\n| Utilities | XLU | Neutral | Neutral | +6.7 | -12.4 | ↑ | RS 1M hồi nhưng RS 3M tệ nhất, rs_slope -3.2, bid phòng thủ tạm |\n| Cons. Staples | XLP | Neutral | Neutral | +6.4 | -7.8 | ↑ | Defensive refuge nhưng OUTFLOW, không catalyst thematic |\n| Real Estate | XLRE | <script>
  const P = JSON.parse(document.getElementById('payload').textContent);
  const fm = P.fm || {};

  document.getElementById('hero-title').textContent = 'Báo cáo Vĩ mô Mỹ — Tháng ' + (P.month||'');
  document.getElementById('hero-sub').textContent = 'US Macro Monthly · chia sẻ chỉ-đọc';
  document.getElementById('hero-takeaway').textContent = fm.key_takeaway || '';

  const BLABEL = {regime:'Chu kỳ', fed_stance:'Fed', economic_health:'Sức khoẻ KT'};
  const badges = document.getElementById('hero-badges');
  ['regime','fed_stance','economic_health'].forEach(k=>{
    if(!fm[k]) return;
    const d=document.createElement('div'); d.className='badge';
    d.innerHTML='<b>'+BLABEL[k]+'</b>'+fm[k]; badges.appendChild(d);
  });

  // Rotation chart
  if(P.rotation && P.rotation.length){
    document.getElementById('rot-title').textContent =
      'Dự báo luân chuyển dòng tiền — tháng ' + P.rotation_target + ' (điểm engine)';
    const labels = P.rotation.map(r=>r.ticker+' · '+r.name);
    const scores = P.rotation.map(r=>r.score);
    new Chart(document.getElementById('rotChart'), {
      type:'bar',
      data:{labels, datasets:[{data:scores, backgroundColor:P.rot_colors, borderRadius:5}]},
      options:{indexAxis:'y', plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>' score '+c.raw.toFixed(2)+'  ('+P.rotation[c.dataIndex].phase+')'}}},
        scales:{x:{grid:{color:'#1e2b45'},ticks:{color:'#8ba0bd'}},
                y:{grid:{display:false},ticks:{color:'#e5edf7',font:{size:12}}}}}
    });
    const PC={INFLOW_LIKELY:['#4ade80','Nhận tiền'],FORMING:['#2dd4bf','Đang hình thành'],
      NEUTRAL:['#8b96a3','Trung tính'],OUTFLOW_LIKELY:['#fbbf24','Rời tiền'],AVOID:['#f87171','Tránh']};
    const lg=document.getElementById('rot-legend');
    Object.values(PC).forEach(([c,t])=>{const s=document.createElement('span');
      s.innerHTML='<span class="dot" style="background:'+c+'"></span>'+t; lg.appendChild(s);});
  } else {
    document.getElementById('rot-card').style.display='none';
  }

  // Report body
  marked.setOptions({gfm:true, breaks:false});
  document.getElementById('report').innerHTML = marked.parse(P.body||'');

  document.getElementById('foot').textContent =
    'Sinh tự động từ hệ thống US Macro Tracking · báo cáo tĩnh tháng ' + P.month + '. Không phải khuyến nghị đầu tư.';
</script>
